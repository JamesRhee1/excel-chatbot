    expected_ops: [derive]
    expected_answer:
      row_count: 4

  - id: rule_value_answer
    query: "인쇄비가 얼마지"
    fixture: budget_comparison.xlsx
    expected_route: rule
    expected_ops: [filter_row_type, value_answer]
    expected_answer:
      row_count: 1

  - id: rule_chain_top_n
    query: "당년도예산 중에 가장 높은 값인 행을 찾아줘"
    fixture: budget_comparison.xlsx
    expected_route: rule
    expected_ops: [filter_row_type, top_n]
    expected_answer:
      row_count: 1

  - id: rule_total_row
