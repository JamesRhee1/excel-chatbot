queries:
  # --- 규칙 경로 (12) ---
  - id: rule_help
    query: "니가 할 수 있는게 뭐야"
    fixture: generic_sales.xlsx
    expected_route: rule
    expected_ops: [help]

  - id: rule_describe
    query: "데이터에 대해서 설명해줘"
    fixture: budget_comparison.xlsx
    expected_route: rule
    expected_ops: [describe_dataset]

  - id: rule_top_n
    query: "매출이 가장 높은 행 찾아줘"
    fixture: generic_sales.xlsx
    expected_route: rule
    expected_ops: [exclude_summary, top_n]
    expected_answer:
      row_count: 1

  - id: rule_filter
    query: "매출이 1500보다 큰 행 보여줘"
    fixture: generic_sales.xlsx
    expected_route: rule
    expected_ops: [exclude_summary, filter]
    expected_answer:
      row_count: 2

  - id: rule_sort
    query: "매출 기준으로 큰 순서대로 보여줘"
    fixture: generic_sales.xlsx
    expected_route: rule
    expected_ops: [exclude_summary, sort]
    expected_answer:
      row_count: 5

  - id: rule_aggregate
    query: "부서별 매출 합계"
    fixture: generic_sales.xlsx
    expected_route: rule
    expected_ops: [exclude_summary, aggregate]
    expected_answer:
      row_count: 3

  - id: rule_derive_subtract
    query: "예산잔액에서 가집행금액 뺀 값 컬럼 만들어줘"
    fixture: budget_comparison.xlsx
    expected_route: rule
    expected_ops: [derive]
    expected_answer:
      row_count: 4

  - id: rule_derive_percent
    query: "가집행금액 대비 예산잔액 비율"
